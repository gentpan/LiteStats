services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-litestats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litestats}
      POSTGRES_DB: ${POSTGRES_DB:-litestats}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-litestats} -d ${POSTGRES_DB:-litestats}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - litestats

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-litestats}:${POSTGRES_PASSWORD:-litestats}@postgres:5432/${POSTGRES_DB:-litestats}
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - litestats

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-litestats}:${POSTGRES_PASSWORD:-litestats}@postgres:5432/${POSTGRES_DB:-litestats}
      NODE_ENV: production
      MONITOR_INTERVAL_SEC: ${MONITOR_INTERVAL_SEC:-60}
    entrypoint: ["/worker-entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - litestats

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@example.com}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - litestats

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  litestats:
    driver: bridge
